name: Waecan CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  test:
    name: Test + Clippy + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace -- --nocapture > test.log 2>&1 || true

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings > clippy.log 2>&1 || true

      - name: cargo fmt check
        run: cargo fmt --all -- --check > fmt.log 2>&1 || true

      - name: Commit and push logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f *.log
          git commit -m "chore: upload CI logs [skip ci]" || true
          git push
